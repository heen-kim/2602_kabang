<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kakao bank</title>
    <!-- 폰트어썸 불러오기 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <!-- 제이쿼리 불러오기 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>

  <body>
    <div class="main_banner con-min-width border-red">
        <div class="con img-box border-blue">
            <img src="../imgs/imgi_21_main-bg3.png" alt="banner">
        </div>
    </div>

    <style>
      /* 폰트 적용 */
      html {
        /* 영문이면 roboto가 적용되고, 한글이면 Noto Sans KR가 적용되도록 아래와 같은 순서로 배치 */
        font-family: "Roboto", "Noto Sans KR", sans-serif;
      }

      /* 노말라이즈 */
      body,
      ul,
      li {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      label[for] {
        cursor: pointer;
        user-select: none;
      }

      /* 라이브러리 */
      .border-red {
        border: 4px solid red;
      }

      .border-pink {
        border: 4px solid pink;
      }

      .border-blue {
        border: 4px solid blue;
      }

      .border-green {
        border: 4px solid green;
      }

      .border-black {
        border: 4px solid black;
      }

      .border-gold {
        border: 4px solid gold;
      }

      .flex {
        display: flex;
      }

      .flex-jc-e {
        justify-content: flex-end;
      }

      .flex-jc-s {
        justify-content: flex-start;
      }

      .flex-jc-c {
        justify-content: center;
      }

      .flex-jc-sb {
        justify-content: space-between;
      }

      .flex-ai-c {
        align-items: center;
      }

      .flex-as-c {
        align-self: center;
      }

      .flex-grow-1 {
        flex-grow: 1;
      }

      .height-100p {
        height: 100%;
      }

      .block {
        display: block;
      }

      .con {
        margin-left: auto;
        margin-right: auto;
      }

      .img-box > img {
        width: 100%;
        display: block;
      }

      .relative {
        position: relative;
      }

      /* 커스텀 */
      .con {
        width: 1080px;
      }

      .con-min-width {
        min-width: 1080px;
      }

      ::selection {
        background-color: #ffe100;
      }

      /* ---------- 메인 배너 시작 ---------- */
      
      /* ---------- 메인 배너 끝 ---------- */



    </style>
  </body>
</html>
